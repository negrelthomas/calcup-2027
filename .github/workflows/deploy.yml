name: Deploy CalCup site
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}
concurrency:
  group: calcup-deploy
  cancel-in-progress: false
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Install generator deps
        working-directory: automation
        run: npm install --no-audit --no-fund
      - name: Regenerate data.js from the master workbook
        working-directory: automation
        env:
          TENANT_ID:     ${{ secrets.TENANT_ID }}
          CLIENT_ID:     ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          SP_HOST:      tenfinancialconsulting.sharepoint.com
          SP_SITE_PATH: /sites/Calcup
          SP_LIBRARY:   Calcup
          SP_FILE:      2027_Calcup Master File.xlsx
          DATA_JS:      ../site/data/data.js
          CHANGED_FLAG: ${{ github.workspace }}/changed.flag
        run: node generate.mjs
      - name: Deploy to Netlify (only when data changed)
        run: |
          if [ "$(cat changed.flag 2>/dev/null)" = "1" ]; then
            cd site
            npx --yes netlify-cli deploy --prod --dir=. \
              --site="${{ secrets.NETLIFY_SITE_ID }}" \
              --auth="${{ secrets.NETLIFY_AUTH_TOKEN }}" \
              --message "auto: master update"
          else echo "No change - nothing to deploy."; fi
      - name: Commit refreshed data.js
        run: |
          if [ "$(cat changed.flag 2>/dev/null)" = "1" ]; then
            git config user.name "calcup-bot"
            git config user.email "bot@users.noreply.github.com"
            git add site/data/data.js && git commit -m "auto: refresh tournament data" && git push
          fi
